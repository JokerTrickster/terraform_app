name: Terraform Plan

on:
  pull_request:
    branches: [main]
    paths:
      - '*.tf'
      - 'modules/**'
      - 'environments/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=environments/dev.tfvars -no-color -input=false
        continue-on-error: true
        env:
          TF_VAR_dev_frog_mysql_password: ${{ secrets.DEV_FROG_MYSQL_PASSWORD }}
          TF_VAR_dev_frog_redis_password: ${{ secrets.DEV_FROG_REDIS_PASSWORD }}
          TF_VAR_dev_frog_rabbitmq_password: ${{ secrets.DEV_FROG_RABBITMQ_PASSWORD }}

      - name: Comment Plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            *Triggered by @${{ github.actor }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output.substring(0, 65536)
            });

      - name: Plan Status
        if: steps.plan.outcome == 'failure'
        run: exit 1
